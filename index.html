<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فاحص تعارض الجداول المطور</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0b1120;
            --box-bg: rgba(255, 255, 255, 0.03);
            --border-color: #272c3e;
            --primary-neon: #a855f7;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1000px; }
        h1 { color: var(--primary-neon); text-align: center; margin-bottom: 30px; }
        
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .upload-box {
            background-color: var(--box-bg);
            border: 2px dashed var(--border-color);
            border-radius: 12px; padding: 30px; text-align: center;
            position: relative; transition: 0.3s;
        }
        .upload-box:hover { border-color: var(--primary-neon); }
        .icon-circle {
            background-color: #2e1065; color: var(--primary-neon);
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px auto; border: 1px solid var(--primary-neon);
        }
        
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        #checkBtn {
            background: linear-gradient(135deg, #7e22ce, #a855f7);
            color: white; border: none; padding: 15px 50px;
            border-radius: 8px; font-size: 18px; width: 100%; cursor: pointer;
        }

        #resultsArea { width: 100%; margin-top: 30px; background: var(--box-bg); padding: 20px; border-radius: 12px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
        th { background: rgba(255, 255, 255, 0.05); color: var(--primary-neon); }
        .conflict-row { background-color: rgba(239, 68, 68, 0.15); color: #ff8a8a; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .bg-success { background: var(--success); color: white; }
        .bg-error { background: var(--error); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 فاحص تعارض الجداول</h1>

    <div class="upload-grid">
        <div class="upload-box" id="boxSS01">
            <div class="icon-circle">📅</div>
            <div>جدول الوحدة (المواد المسجلة)</div>
            <small id="nameSS01" style="color: var(--success)"></small>
            <input type="file" id="inputSS01" class="file-input" accept=".xlsx, .xls">
        </div>

        <div class="upload-box" id="boxSF01">
            <div class="icon-circle">📄</div>
            <div>جدول الاختبارات العام</div>
            <small id="nameSF01" style="color: var(--success)"></small>
            <input type="file" id="inputSF01" class="file-input" accept=".xlsx, .xls">
        </div>
    </div>

    <button id="checkBtn">بدأ الفحص والمقارنة</button>

    <div id="resultsArea">
        <h2 style="text-align: center;">📋 نتائج التداخل</h2>
        <div id="resultsTable"></div>
    </div>
</div>

<script>
    // دالة ذكية للبحث عن القيمة بناءً على مسميات محتملة للعمود
    function getValue(row, possibleNames) {
        for (let name of possibleNames) {
            if (row[name] !== undefined) return row[name];
        }
        return "غير محدد";
    }

    async function parseExcel(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                resolve(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    document.getElementById('inputSS01').onchange = (e) => document.getElementById('nameSS01').innerText = e.target.files[0].name;
    document.getElementById('inputSF01').onchange = (e) => document.getElementById('nameSF01').innerText = e.target.files[0].name;

    document.getElementById('checkBtn').onclick = async () => {
        const file1 = document.getElementById('inputSS01').files[0];
        const file2 = document.getElementById('inputSF01').files[0];

        if (!file1 || !file2) return alert("يرجى اختيار الملفين");

        const dataSS01 = await parseExcel(file1);
        const dataSF01 = await parseExcel(file2);

        // مسميات الأعمدة المحتملة
        const colID = ['رمز المادة', 'الرمز', 'كود المادة', 'Course Code', 'رمز المقرر'];
        const colName = ['اسم المادة', 'المادة', 'Course Name', 'اسم المقرر'];
        const colDay = ['اليوم', 'يوم', 'Day'];
        const colTime = ['الوقت', 'وقت', 'الفترة', 'Time'];

        let html = `<table><thead><tr>
            <th>الرمز</th><th>المادة</th><th>موعد الدراسة</th><th>موعد الاختبار</th><th>الحالة</th>
        </tr></thead><tbody>`;

        // استخراج مواد الطالب
        const myCourseCodes = dataSS01.map(r => String(getValue(r, colID)).trim());

        dataSF01.forEach(examRow => {
            const examCode = String(getValue(examRow, colID)).trim();
            
            // إذا كانت المادة موجودة في جدول الطالب
            if (myCourseCodes.includes(examCode)) {
                const studentRow = dataSS01.find(r => String(getValue(r, colID)).trim() === examCode);
                
                const sDay = getValue(studentRow, colDay);
                const sTime = getValue(studentRow, colTime);
                const eDay = getValue(examRow, colDay);
                const eTime = getValue(examRow, colTime);

                const isConflict = (sDay === eDay && sTime === eTime);

                html += `<tr class="${isConflict ? 'conflict-row' : ''}">
                    <td>${examCode}</td>
                    <td>${getValue(examRow, colName)}</td>
                    <td>${sDay} / ${sTime}</td>
                    <td>${eDay} / ${eTime}</td>
                    <td>
                        <span class="status-badge ${isConflict ? 'bg-error' : 'bg-success'}">
                            ${isConflict ? '⚠️ تعارض' : '✅ سليم'}
                        </span>
                    </td>
                </tr>`;
            }
        });

        html += "</tbody></table>";
        document.getElementById('resultsTable').innerHTML = html;
        document.getElementById('resultsArea').style.display = 'block';
    };
</script>
</body>
</html>
