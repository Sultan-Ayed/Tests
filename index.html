<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف تعارض الاختبارات - الكلية التقنية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #0f172a; --neon: #8b5cf6; --card: #1e293b; --border: #334155; --text: #f1f5f9; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: var(--neon); font-size: 2.5rem; text-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px; }
        .upload-card { background: var(--card); border: 2px dashed var(--border); border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-card:hover { border-color: var(--neon); background: rgba(139, 92, 246, 0.05); }
        .icon { font-size: 50px; margin-bottom: 15px; display: block; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .btn-check { background: linear-gradient(135deg, #6d28d9, #8b5cf6); color: white; border: none; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5); }
        .btn-check:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.6); }
        #result-section { margin-top: 40px; background: var(--card); border-radius: 20px; padding: 25px; display: none; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: rgba(255,255,255,0.05); color: var(--neon); font-weight: bold; }
        .conflict { background: rgba(239, 68, 68, 0.1) !important; color: #fca5a5; }
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge-safe { background: var(--success); color: white; }
        .badge-conflict { background: var(--error); color: white; }
        .file-info { margin-top: 10px; font-size: 0.9rem; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔍 نظام كشف تعارض الاختبارات</h1>
        <p style="color: #94a3b8;">خاص لطلاب ومستودعات جداول الكليات التقنية</p>
    </header>

    <div class="grid">
        <div class="upload-card">
            <span class="icon">📜</span>
            <strong>جدول الوحدة (المسجل)</strong>
            <div id="info1" class="file-info"></div>
            <input type="file" id="file-student" accept=".xlsx, .xls, .csv">
        </div>
        <div class="upload-card">
            <span class="icon">📅</span>
            <strong>جدول الاختبارات العام</strong>
            <div id="info2" class="file-info"></div>
            <input type="file" id="file-exams" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button class="btn-check" onclick="processData()">تحليل الجداول وكشف التداخل</button>

    <div id="result-section">
        <h2 style="text-align: center; margin-bottom: 20px;">📋 تقرير فحص المواد</h2>
        <div id="table-output"></div>
    </div>
</div>

<script>
    // وظيفة للبحث عن القيمة بأي اسم عمود متوقع
    const findValue = (row, patterns) => {
        const keys = Object.keys(row);
        for (const p of patterns) {
            const key = keys.find(k => k.trim().includes(p));
            if (key) return String(row[key]).trim();
        }
        return null;
    };

    // مسميات أعمدة ملفات TVTC
    const COL_MAP = {
        code: ['المقرّر', 'رمز المادة', 'الرمز', 'Code'],
        name: ['اسم المقرّر', 'اسم المادة', 'المادة', 'Name'],
        day: ['اليوم', 'يوم', 'Day'],
        time: ['الوقت من', 'الفترة', 'وقت', 'Time']
    };

    document.getElementById('file-student').onchange = e => document.getElementById('info1').innerText = "✅ " + e.target.files[0].name;
    document.getElementById('file-exams').onchange = e => document.getElementById('info2').innerText = "✅ " + e.target.files[0].name;

    async function processData() {
        const sFile = document.getElementById('file-student').files[0];
        const eFile = document.getElementById('file-exams').files[0];

        if (!sFile || !eFile) return alert("يرجى اختيار الملفين للمتابعة");

        const readExcel = (file) => new Promise(res => {
            const reader = new FileReader();
            reader.onload = e => {
                const workbook = XLSX.read(e.target.result, { type: 'array' });
                res(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]));
            };
            reader.readAsArrayBuffer(file);
        });

        const studentData = await readExcel(sFile);
        const examData = await readExcel(eFile);

        // 1. حصر مواد الطالب
        const studentCourses = studentData.map(r => ({
            code: findValue(r, COL_MAP.code),
            day: findValue(r, COL_MAP.day),
            time: findValue(r, COL_MAP.time)
        })).filter(c => c.code);

        let html = `<table><thead><tr><th>الرمز</th><th>اسم المادة</th><th>موعد المحاضرة</th><th>موعد الاختبار</th><th>النتيجة</th></tr></thead><tbody>`;

        studentCourses.forEach(course => {
            // البحث عن موعد اختبار هذه المادة
            const exam = examData.find(e => findValue(e, COL_MAP.code) === course.code);
            
            if (exam) {
                const eDay = findValue(exam, COL_MAP.day);
                const eTime = findValue(exam, COL_MAP.time);
                const eName = findValue(exam, COL_MAP.name);

                // كشف التعارض: إذا كان يوم المحاضرة هو نفس يوم الاختبار
                // ملاحظة: يمكنك تغيير المنطق هنا ليقارن بين اختبارين بدلاً من محاضرة واختبار
                const isConflict = (course.day === eDay); 

                html += `<tr class="${isConflict ? 'conflict' : ''}">
                    <td>${course.code}</td>
                    <td>${eName || '---'}</td>
                    <td>${course.day} / ${course.time}</td>
                    <td>${eDay} / ${eTime}</td>
                    <td>
                        <span class="badge ${isConflict ? 'badge-conflict' : 'badge-safe'}">
                            ${isConflict ? '⚠️ تعارض' : '✅ سليم'}
                        </span>
                    </td>
                </tr>`;
            }
        });

        html += `</tbody></table>`;
        document.getElementById('table-output').innerHTML = html;
        document.getElementById('result-section').style.display = 'block';
        window.scrollTo({ top: document.getElementById('result-section').offsetTop, behavior: 'smooth' });
    }
</script>

</body>
</html>
