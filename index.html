<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فاحص تعارض جداول الكلية التقنية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main: #a855f7; --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .box { background: var(--card); border: 2px dashed #334155; border-radius: 15px; padding: 30px; text-align: center; position: relative; transition: 0.3s; }
        .box:hover { border-color: var(--main); }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .btn { background: var(--main); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        #results { margin-top: 30px; display: none; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 15px; border: 1px solid #334155; text-align: center; }
        th { background: #2d3748; color: var(--main); }
        .conflict-box { background: #ef4444; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; border-right: 5px solid white; }
        .badge { background: #334155; padding: 4px 10px; border-radius: 6px; color: var(--main); border: 1px solid var(--main); font-family: monospace; }
        .status-safe { color: #10b981; font-weight: bold; }
        .file-name { color: #10b981; font-size: 12px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--main);">🔍 فاحص التعارض (النسخة النهائية)</h1>
    
    <div class="upload-section">
        <div class="box">
            <span>📅 1. ارفع (جدول الوحدة)</span>
            <span id="n1" class="file-name"></span>
            <input type="file" id="f1" accept=".xlsx, .xls, .csv">
        </div>
        <div class="box">
            <span>📝 2. ارفع (جدول الاختبارات)</span>
            <span id="n2" class="file-name"></span>
            <input type="file" id="f2" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button class="btn" onclick="startCheck()">بدأ فحص التعارض الآن</button>

    <div id="results">
        <div id="alert-area"></div>
        <h2 style="text-align: center;">📊 جدول مواعيد اختباراتك</h2>
        <div id="table-wrap"></div>
    </div>
</div>

<script>
    document.getElementById('f1').onchange = e => document.getElementById('n1').innerText = "تم رفع جدولك: " + e.target.files[0].name;
    document.getElementById('f2').onchange = e => document.getElementById('n2').innerText = "تم رفع الاختبارات: " + e.target.files[0].name;

    async function startCheck() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];

        if (!file1 || !file2) return alert("يرجى رفع الملفين");

        const read = (f) => new Promise(res => {
            const r = new FileReader();
            r.onload = e => {
                const b = XLSX.read(e.target.result, {type:'array'});
                res(XLSX.utils.sheet_to_json(b.Sheets[b.SheetNames[0]], {header: 1}));
            };
            r.readAsArrayBuffer(f);
        });

        const studentData = await read(file1);
        const examData = await read(file2);

        // 1. استخراج رموز المواد من جدولك (نتجاهل "غير محدد")
        const myCodes = new Set();
        studentData.forEach(row => {
            row.forEach(cell => {
                const txt = String(cell).trim();
                // يبحث عن نمط "برمج-121" أو "انجل-101"
                if (/^[أ-ي]{2,5}-\d{2,4}$/.test(txt)) myCodes.add(txt);
            });
        });

        let finalExams = [];
        let html = `<table><thead><tr><th>الرمز</th><th>اسم المادة</th><th>يوم الاختبار</th><th>الفترة</th><th>الحالة</th></tr></thead><tbody>`;

        // 2. البحث عن مواعيد هذه المواد في جدول الاختبارات
        myCodes.forEach(code => {
            for (let i = 0; i < examData.length; i++) {
                for (let j = 0; j < examData[i].length; j++) {
                    if (String(examData[i][j]).trim() === code) {
                        const day = findDay(examData, i);
                        const period = examData[i][1] || "غير محدد";
                        const name = examData[i][j-1] || "---";

                        finalExams.push({ code, day, period, name });
                        
                        html += `<tr>
                            <td><span class="badge">${code}</span></td>
                            <td>${name}</td>
                            <td>${day}</td>
                            <td>فترة ${period}</td>
                            <td class="status-safe">✅ سليم</td>
                        </tr>`;
                        return;
                    }
                }
            }
        });

        html += `</tbody></table>`;

        // 3. كشف التعارض الحقيقي (مادتين في نفس اليوم والفترة)
        let conflicts = "";
        for (let i = 0; i < finalExams.length; i++) {
            for (let j = i + 1; j < finalExams.length; j++) {
                if (finalExams[i].day === finalExams[j].day && finalExams[i].period === finalExams[j].period) {
                    conflicts += `<div class="conflict-box">⚠️ تعارض اختبار: مادة (${finalExams[i].code}) مع مادة (${finalExams[j].code}) يوم ${finalExams[i].day} - الفترة ${finalExams[i].period}</div>`;
                }
            }
        }

        document.getElementById('alert-area').innerHTML = conflicts;
        document.getElementById('table-wrap').innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }

    function findDay(data, index) {
        for (let i = index; i >= 0; i--) {
            const val = String(data[i][0]);
            if (val.includes("الأحد") || val.includes("الاثنين") || val.includes("الثلاثاء") || val.includes("الأربعاء") || val.includes("الخميس")) {
                return val.split('\n')[0];
            }
        }
        return "غير محدد";
    }
</script>
</body>
</html>
