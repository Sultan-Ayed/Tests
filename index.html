<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فاحص تعارض جداول الكلية التقنية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main: #a855f7; --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        .box-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .upload-box { background: var(--card); border: 2px dashed #334155; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; position: relative; }
        .upload-box:hover { border-color: var(--main); }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .btn { background: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; font-weight: bold; }
        #results { margin-top: 30px; display: none; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        th { background: #2d3748; color: var(--main); }
        .conflict { background: rgba(239, 68, 68, 0.2) !important; color: #fca5a5; }
        .safe { color: #10b981; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; background: #334155; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--main);">🔍 فاحص التعارض التقني</h1>
    
    <div class="box-grid">
        <div class="upload-box">
            <span>📅 ارفع ملف (جدول الوحدة)</span>
            <div id="n1" style="font-size: 12px; color: #10b981; margin-top: 5px;"></div>
            <input type="file" id="f1" accept=".xlsx, .xls, .csv">
        </div>
        <div class="upload-box">
            <span>📝 ارفع ملف (الاختبارات النهائية)</span>
            <div id="n2" style="font-size: 12px; color: #10b981; margin-top: 5px;"></div>
            <input type="file" id="f2" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button class="btn" onclick="process()">بدأ التحليل الذكي</button>

    <div id="results">
        <h2 style="text-align: center;">📊 تقرير المواد الخاصة بك</h2>
        <div id="table-wrap"></div>
    </div>
</div>

<script>
    // تحديث أسماء الملفات عند الرفع
    document.getElementById('f1').onchange = e => document.getElementById('n1').innerText = e.target.files[0].name;
    document.getElementById('f2').onchange = e => document.getElementById('n2').innerText = e.target.files[0].name;

    async function process() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];

        if (!file1 || !file2) return alert("يرجى رفع الملفين");

        const read = (f) => new Promise(res => {
            const r = new FileReader();
            r.onload = e => {
                const b = XLSX.read(e.target.result, {type:'array'});
                // تحويل الورقة الأولى إلى مصفوفة بيانات خام (Raw Array)
                res(XLSX.utils.sheet_to_json(b.Sheets[b.SheetNames[0]], {header: 1}));
            };
            r.readAsArrayBuffer(f);
        });

        const data1 = await read(file1); // جدول الوحدة
        const data2 = await read(file2); // جدول الاختبارات

        // دالة ذكية لاستخراج المواد من جدول الوحدة (تبحث عن نمط الرمز مثل: برمج-121)
        const myCourses = [];
        data1.forEach(row => {
            row.forEach(cell => {
                if (cell && /^[أ-ي]{2,5}-\d{3}$/.test(String(cell).trim())) {
                    myCourses.push(String(cell).trim());
                }
            });
        });

        let html = `<table><thead><tr><th>رمز المادة</th><th>المادة</th><th>اليوم</th><th>الفترة</th><th>الحالة</th></tr></thead><tbody>`;
        
        // البحث عن كل مادة في جدول الاختبارات
        const uniqueCourses = [...new Set(myCourses)];
        uniqueCourses.forEach(code => {
            let examInfo = null;
            
            // البحث في كل الخلايا في جدول الاختبارات عن الرمز
            for (let i = 0; i < data2.length; i++) {
                for (let j = 0; j < data2[i].length; j++) {
                    if (String(data2[i][j]).trim() === code) {
                        // إذا وجدنا الرمز، نأخذ البيانات المجاورة له
                        // بناءً على تنسيق ملفك: المادة عادة قبل الرمز، واليوم في أول العمود
                        examInfo = {
                            code: code,
                            name: data2[i][j-1] || "غير متوفر",
                            // محاولة العثور على اليوم (عادة يكون في أسطر سابقة أو نفس السطر)
                            day: findDayInRows(data2, i),
                            time: data2[i][1] || "غير محدد" // العمود م (رقم الفترة)
                        };
                        break;
                    }
                }
                if (examInfo) break;
            }

            if (examInfo) {
                html += `<tr>
                    <td><span class="badge">${examInfo.code}</span></td>
                    <td>${examInfo.name}</td>
                    <td>${examInfo.day}</td>
                    <td>الفترة ${examInfo.time}</td>
                    <td class="safe">✅ مضافة للتقرير</td>
                </tr>`;
            }
        });

        html += `</tbody></table>`;
        document.getElementById('table-wrap').innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }

    // دالة للبحث عن اليوم في الأسطر السابقة (لأن ملف الإكسيل يدمج الخلايا)
    function findDayInRows(data, index) {
        for (let i = index; i >= 0; i--) {
            const cell = String(data[i][0]);
            if (cell.includes("الأحد") || cell.includes("الاثنين") || cell.includes("الثلاثاء") || cell.includes("الأربعاء") || cell.includes("الخميس")) {
                return cell.split('\n')[0]; // نأخذ اسم اليوم فقط بدون التاريخ
            }
        }
        return "غير محدد";
    }
</script>
</body>
</html>
