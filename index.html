<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة جداول الاختبارات - الكلية التقنية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main-color: #7c3aed; --bg-dark: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { text-align: center; padding: 40px 0; }
        h1 { color: var(--main-color); margin-bottom: 10px; }
        .upload-area { background: var(--card-bg); border: 2px dashed #334155; border-radius: 20px; padding: 50px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-area:hover { border-color: var(--main-color); background: rgba(124, 58, 237, 0.05); }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .btn { background: var(--main-color); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; }
        #results { margin-top: 40px; display: none; }
        .result-card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-right: 5px solid var(--main-color); }
        .conflict-alert { background: #ef4444; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .badge { background: #334155; padding: 4px 8px; border-radius: 5px; font-size: 14px; color: var(--main-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 فاحص تعارض الاختبارات</h1>
        <p>ارفع ملفاتك لتحويل الجدول إلى نسخة تفاعلية</p>
    </div>

    <div class="upload-area" id="drop-zone">
        <span style="font-size: 50px;">📄</span>
        <p id="file-name">اسحب ملف الإكسيل هنا أو انقر للاختيار</p>
        <input type="file" id="fileInput" accept=".xlsx, .xlsm, .csv">
    </div>

    <button class="btn" onclick="processExams()">تحليل الجدول الآن</button>

    <div id="results">
        <div id="status-msg"></div>
        <div id="exam-list"></div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    fileInput.onchange = e => document.getElementById('file-name').innerText = e.target.files[0].name;

    async function processExams() {
        const file = fileInput.files[0];
        if (!file) return alert("يرجى رفع الملف أولاً");

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {header: 1});
            
            displayData(jsonData);
        };
        reader.readAsArrayBuffer(file);
    }

    function displayData(rows) {
        const list = document.getElementById('exam-list');
        const resultsDiv = document.getElementById('results');
        list.innerHTML = "";
        resultsDiv.style.display = 'block';

        // منطق استخراج المواد من ملفك (يبحث عن الرموز في أي خلية)
        let foundAny = false;
        rows.forEach((row, index) => {
            row.forEach(cell => {
                const val = String(cell).trim();
                if (/^[أ-ي]{2,5}-\d{2,4}$/.test(val)) {
                    foundAny = true;
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <strong>المادة:</strong> ${val} <span class="badge">سطر ${index + 1}</span><br>
                        <small style="color:#94a3b8">تم اكتشاف المادة في الجدول العام</small>
                    `;
                    list.appendChild(card);
                }
            });
        });

        if(!foundAny) {
            list.innerHTML = "<p style='text-align:center'>لم يتم العثور على مواد بتنسيق (رمز-رقم) في الورقة الأولى.</p>";
        }
    }
</script>
</body>
</html>
